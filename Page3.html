<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Request Form</title>
</head>
<link rel="stylesheet" href="style.css">
<body>

    

  <div class="top-bar"> 
        <button class="toggle-button">
            <img src="/images/CakeOn .PNG" class="light-on" alt="Toggle Light/Light Mode" id="toggle-icon">
        </button>
        <a href="index.html" class="button-zero">Home</a>
        <a href="Page1.html" class="button-one">Birthday Message</a> 
     <a href="Page2.html" class="button-two">Our Memories</a> 
    <a href="Page3.html" class="button-three">Special Requests</a>
    </div>

    <form class="form-box">
        <label class="name" for="name">Name:</label>
        
        <select class="name1" name="name" id="name" required placeholder="-- Select an option --">
           <option value="" disabled selected>-- Select an option --</option>
            <option value="Blake Quigley">Blake Quigley</option>
            <option value="The Best Boyfriend Ever(aka Blake Quigley)">The Best Boyfriend Ever (aka Blake Quigley)</option>
            <option value="My Pickle">My Pickle</option>
        </select>
<br>
        <label class="service-desired" for="service desired" required>Service Desired:</label>

        <br>
        <input type="radio" name="service desired">Hugs and Kisses</input>
        <br>
        <input type="radio" name="service desired">Words of Encouragment</input>
        <br>
        <input type="radio" name="service desired">Quality Time</input>
        <br>
        <input type="radio" name="service desired">Massage/Cuddle</input>
<br>
        <label class="tmessage-word" for="message">Message:</label>

        <input class="more" type="text" name="message" placeholder="If there is anything more you need me to know :)"></input>
        <br>
        <input class="form-button" type="submit"></input>

    </form>
</body>
</html>
